services:
  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cha}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-cha_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cha_network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cha} -d ${POSTGRES_DB:-cha_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend (Node.js / Express / Prisma)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cha}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cha_db}
      JWT_SECRET: ${JWT_SECRET}
      NODE_ENV: production
      PORT: 3001
      APP_URL: ${APP_URL}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
    volumes:
      - uploads_data:/app/uploads
    networks:
      - cha_network
    depends_on:
      postgres:
        condition: service_healthy

  # Frontend (React / nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - 80
    networks:
      - cha_network
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:

networks:
  cha_network:
    driver: bridge
